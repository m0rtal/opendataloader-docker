version: "3.8"

services:
  opendataloader-hybrid:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: opendataloader-hybrid
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "5002:5002"
    volumes:
      # Доступ к PDF-библиотеке (read-only)
      - /mnt/storage/Learning:/mnt/storage/Learning:ro
      # Для debug-логов opendataloader
      - ./logs:/tmp/opendataloader
    environment:
      - HYBRID_PORT=5002
      - HYBRID_OCR_LANG=rus,eng
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
