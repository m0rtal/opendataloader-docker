version: "3.8"

services:
  opendataloader-hybrid:
    image: opendataloader:fixed
    container_name: opendataloader-hybrid
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "5002:5002"
    volumes:
      - opendataloader_logs:/tmp/opendataloader
    environment:
      - HYBRID_PORT=5002
      - HYBRID_OCR_LANG=ru,en
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - opendataloader

volumes:
  opendataloader_logs:

networks:
  opendataloader:
    driver: bridge
